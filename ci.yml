name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install backend dependencies
        run: npm ci
      - name: Lint backend
        run: npm run lint
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Lint frontend
        run: npm --prefix frontend run lint

  unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: inventory_db
          POSTGRES_USER: inventory_app
          POSTGRES_PASSWORD: test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory_app -d inventory_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      NODE_ENV: test
      RUN_RELIABILITY_TESTS: false
      PORT: 5000
      DB_USER: inventory_app
      DB_PASSWORD: test_pw
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: inventory_db
      JWT_SECRET: ci_test_secret
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      ALLOW_LAN_CORS: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install backend dependencies
        run: npm ci
      - name: Run DB migration
        run: npm run db:migrate
      - name: Seed users for tests
        run: npm run db:seed:test
      - name: Run unit tests
        run: npm run test:unit
      - name: Run smoke tests
        run: npm run test:smoke
      - name: Seed pilot clinic
        run: npm run db:seed:pilot
      - name: Dependency scan (backend)
        run: npm audit --omit=dev

  integration:
    runs-on: ubuntu-latest
    needs: [lint, unit]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: inventory_db
          POSTGRES_USER: inventory_app
          POSTGRES_PASSWORD: test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory_app -d inventory_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      NODE_ENV: test
      RUN_RELIABILITY_TESTS: true
      PORT: 5000
      DB_USER: inventory_app
      DB_PASSWORD: test_pw
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: inventory_db
      JWT_SECRET: ci_test_secret
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      ALLOW_LAN_CORS: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install backend dependencies
        run: npm ci
      - name: Run DB migration
        run: npm run db:migrate
      - name: Seed users for tests
        run: npm run db:seed:test
      - name: Seed pilot clinic
        run: npm run db:seed:pilot
      - name: Run integration tests
        run: npm run test:integration

  frontend:
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Dependency scan (frontend)
        run: npm audit --omit=dev

  e2e:
    runs-on: ubuntu-latest
    needs: [integration, frontend]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: inventory_db
          POSTGRES_USER: inventory_app
          POSTGRES_PASSWORD: test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory_app -d inventory_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      CI: true
      NODE_ENV: test
      DB_USER: inventory_app
      DB_PASSWORD: test_pw
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: inventory_db
      JWT_SECRET: ci_test_secret
      CORS_ORIGIN: http://127.0.0.1:4173
      ALLOW_LAN_CORS: false
      VITE_API_BASE_URL: http://127.0.0.1:5000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install backend dependencies
        run: npm ci
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Build frontend for preview
        run: npm --prefix frontend run build
      - name: Run DB migration
        run: npm run db:migrate
      - name: Seed users for E2E
        run: npm run db:seed:test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E
        run: npm run e2e -- --project=chromium
