name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: inventory_db
          POSTGRES_USER: inventory_app
          POSTGRES_PASSWORD: test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory_app -d inventory_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      NODE_ENV: test
      PORT: 5000
      DB_USER: inventory_app
      DB_PASSWORD: test_pw
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: inventory_db
      JWT_SECRET: ci_test_secret
      CORS_ORIGIN: http://127.0.0.1:4173,http://localhost:4173,http://127.0.0.1:5173,http://localhost:5173
      ALLOW_LAN_CORS: false
      RUN_RELIABILITY_TESTS: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run DB migration
        run: npm run db:migrate
      - name: Seed test users
        run: npm run db:seed:test
      - name: Seed pilot clinic
        run: npm run db:seed:pilot
      - name: Run backend tests
        run: npm run test:backend

  e2e:
    runs-on: ubuntu-latest
    needs:
      - lint-and-build
      - backend-tests
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: inventory_db
          POSTGRES_USER: inventory_app
          POSTGRES_PASSWORD: test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory_app -d inventory_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      CI: true
      NODE_ENV: test
      PORT: 5000
      DB_USER: inventory_app
      DB_PASSWORD: test_pw
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: inventory_db
      JWT_SECRET: ci_test_secret
      CORS_ORIGIN: http://127.0.0.1:4173
      ALLOW_LAN_CORS: false
      E2E_BASE_URL: http://127.0.0.1:4173
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run DB migration
        run: npm run db:migrate
      - name: Seed test users
        run: npm run db:seed:test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npm run e2e -- --project=chromium
